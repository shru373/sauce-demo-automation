name: Tests

# Run the suite on every push and pull request to main, and on demand.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest   # GitHub's Linux machines ship with Chrome pre-installed

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven          # reuse downloaded dependencies between runs, so it's faster

      - name: Run the tests
        run: mvn -B test        # headless by default; Selenium Manager resolves the driver

      # If anything failed, keep the screenshots the listener captured so we can see why.
      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: target/screenshots/
          if-no-files-found: ignore
